<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgênciaFacilZap — Painel de Conteúdo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    :root {
      --bg-primary:#0a0a0f; --bg-secondary:#0f0f1a;
      --bg-card:rgba(255,255,255,0.03); --border:rgba(255,255,255,0.08);
      --border-subtle:rgba(255,255,255,0.04); --border-sidebar:rgba(255,255,255,0.06);
      --accent-green:#00ff88; --accent-green-dark:#00cc6a;
      --accent-green-dim:rgba(0,255,136,0.12); --accent-green-glow:rgba(0,255,136,0.25);
      --accent-green-faint:rgba(0,255,136,0.04);
      --accent-orange:#ff8c42; --accent-orange-dim:rgba(255,140,66,0.12);
      --accent-red:#ff4466; --accent-red-dim:rgba(255,68,102,0.12);
      --accent-blue:#6478ff; --accent-blue-dim:rgba(100,120,255,0.12);
      --accent-purple:#b06cff; --accent-purple-dim:rgba(176,108,255,0.12);
      --text-primary:#ffffff; --text-secondary:rgba(255,255,255,0.55);
      --text-muted:rgba(255,255,255,0.25); --text-inverse:#0a0a0f;
      --font-display:'Syne',sans-serif; --font-body:'DM Sans',sans-serif;
      --font-mono:'JetBrains Mono',monospace;
      --sidebar-width:240px; --radius-sm:8px; --radius-md:12px; --radius-lg:16px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;background:var(--bg-primary);color:var(--text-secondary);font-family:var(--font-body);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;}
    #root{display:flex;min-height:100vh;}
    @keyframes fadeInCard{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulse-green{0%,100%{opacity:1;box-shadow:0 0 6px var(--accent-green-glow)}50%{opacity:.5;box-shadow:none}}
    @keyframes shimmer{from{transform:translateX(-100%)}to{transform:translateX(100%)}}
    @keyframes slideInToast{from{transform:translateY(80px);opacity:0}to{transform:translateY(0);opacity:1}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse-bar{0%,100%{opacity:.6}50%{opacity:1}}

    /* SIDEBAR */
    .sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--sidebar-width);background:var(--bg-secondary);border-right:1px solid var(--border-sidebar);display:flex;flex-direction:column;z-index:100;}
    .logo-area{padding:26px 22px 20px;border-bottom:1px solid var(--border-sidebar);}
    .logo-row{display:flex;align-items:center;gap:10px;}
    .logo-icon{font-size:22px;width:36px;height:36px;background:var(--accent-green-dim);border:1px solid rgba(0,255,136,.2);border-radius:10px;display:flex;align-items:center;justify-content:center;}
    .logo-text{font-family:var(--font-display);font-size:16px;font-weight:700;color:var(--text-primary);letter-spacing:-.4px;}
    .logo-sub{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);margin-top:6px;letter-spacing:.3px;}
    .nav{flex:1;padding:10px 0;overflow-y:auto;}
    .nav-group-label{padding:14px 22px 4px;font-family:var(--font-mono);font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;}
    .nav-item{display:flex;align-items:center;gap:10px;padding:11px 22px;cursor:pointer;border-left:2px solid transparent;transition:all 200ms ease;color:var(--text-secondary);font-size:13px;font-weight:500;}
    .nav-item:hover{color:var(--text-primary);background:rgba(255,255,255,.03);border-left-color:rgba(255,255,255,.18);}
    .nav-item.active{color:var(--accent-green);background:rgba(0,255,136,.05);border-left-color:var(--accent-green);}
    .nav-icon{width:18px;text-align:center;font-size:13px;flex-shrink:0;}
    .nav-badge{margin-left:auto;background:var(--accent-orange);color:#000;font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px;min-width:18px;text-align:center;}
    .sidebar-footer{padding:18px 22px;border-top:1px solid var(--border-sidebar);font-family:var(--font-mono);font-size:11px;color:var(--text-muted);}
    .status-pulse{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent-green);margin-right:8px;vertical-align:middle;animation:pulse-green 2s ease-in-out infinite;}

    /* LAYOUT */
    .main{margin-left:var(--sidebar-width);flex:1;display:flex;flex-direction:column;}
    .topbar{position:sticky;top:0;background:rgba(10,10,15,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between;z-index:50;}
    .topbar-title{font-family:var(--font-display);font-size:16px;font-weight:700;color:var(--text-primary);letter-spacing:-.3px;}
    .topbar-right{display:flex;align-items:center;gap:14px;}
    .topbar-user{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);}
    .content{padding:32px;flex:1;}

    /* BUTTONS */
    .btn{position:relative;overflow:hidden;display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:var(--radius-sm);font-family:var(--font-body);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all 200ms ease;text-decoration:none;}
    .btn::before{content:'';position:absolute;top:0;left:-100%;bottom:0;width:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.07),transparent);transition:none;}
    .btn:hover::before{animation:shimmer .55s ease;}
    .btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important;}
    .btn-primary{background:var(--accent-green);color:var(--text-inverse);}
    .btn-primary:hover:not(:disabled){background:var(--accent-green-dark);transform:translateY(-1px);box-shadow:0 4px 20px var(--accent-green-glow);}
    .btn-secondary{background:rgba(255,255,255,.05);color:var(--text-secondary);border:1px solid var(--border);}
    .btn-secondary:hover:not(:disabled){background:rgba(255,255,255,.08);color:var(--text-primary);border-color:rgba(255,255,255,.16);}
    .btn-sm{padding:6px 12px;font-size:12px;border-radius:7px;}
    .btn-ghost{background:transparent;color:var(--text-muted);border:1px solid transparent;}
    .btn-ghost:hover{color:var(--text-primary);border-color:var(--border);}
    .btn-danger{background:var(--accent-red-dim);color:var(--accent-red);border:1px solid rgba(255,68,102,.2);}
    .btn-danger:hover:not(:disabled){background:rgba(255,68,102,.2);transform:translateY(-1px);}
    .btn-approve{background:var(--accent-green-dim);color:var(--accent-green);border:1px solid rgba(0,255,136,.2);}
    .btn-approve:hover:not(:disabled){background:rgba(0,255,136,.2);transform:translateY(-1px);}
    .btn-purple{background:var(--accent-purple-dim);color:var(--accent-purple);border:1px solid rgba(176,108,255,.25);}
    .btn-purple:hover:not(:disabled){background:rgba(176,108,255,.22);transform:translateY(-1px);}

    /* CARDS */
    .card{background:var(--bg-card);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;animation:fadeInCard .35s ease both;}
    .card-title{font-family:var(--font-display);font-size:14px;font-weight:700;letter-spacing:-.2px;margin-bottom:20px;color:var(--text-primary);}

    /* METRIC CARDS */
    .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px;}
    .stat-card{background:var(--bg-card);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px 22px;position:relative;overflow:hidden;transition:border-color 250ms ease,transform 250ms ease,box-shadow 250ms ease;animation:fadeInCard .4s ease both;}
    .stat-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,255,136,.05) 0%,transparent 55%);pointer-events:none;}
    .stat-card:hover{border-color:rgba(0,255,136,.2);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,255,136,.06);}
    .stat-label{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:12px;}
    .stat-value{font-family:var(--font-display);font-size:36px;font-weight:800;color:var(--text-primary);letter-spacing:-1.5px;line-height:1;}
    .stat-value.loading{color:var(--text-muted);font-size:24px;}
    .stat-change{font-size:12px;color:var(--text-muted);margin-top:6px;}
    .stat-change .up{color:var(--accent-green);}
    .stat-change .down{color:var(--accent-red);}

    /* SECTION HEADER */
    .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
    .section-title{font-family:var(--font-display);font-size:13px;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px;}

    /* TABLE */
    .calendar-table{width:100%;border-collapse:collapse;font-size:13px;}
    .calendar-table th{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;padding:14px 12px;text-align:left;border-bottom:1px solid var(--border);}
    .calendar-table td{padding:14px 12px;border-bottom:1px solid var(--border-subtle);color:var(--text-secondary);}
    .calendar-table tbody tr:last-child td{border-bottom:none;}
    .calendar-table tbody tr:hover td{background:rgba(255,255,255,.02);}
    .date-cell{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);}

    /* BADGES */
    .badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:600;font-family:var(--font-mono);}
    .badge-video{background:rgba(100,120,255,.12);color:#8899ff;border:1px solid rgba(100,120,255,.2);}
    .badge-post{background:rgba(255,170,50,.12);color:#ffb347;border:1px solid rgba(255,170,50,.2);}
    .badge-pending{background:rgba(255,255,255,.05);color:var(--text-muted);border:1px solid var(--border);}
    .badge-done{background:var(--accent-green-dim);color:var(--accent-green);border:1px solid rgba(0,255,136,.2);}
    .badge-gerando{background:rgba(255,170,50,.12);color:#ffb347;border:1px solid rgba(255,170,50,.2);}
    .badge-aprovado{background:var(--accent-green-dim);color:var(--accent-green);border:1px solid rgba(0,255,136,.2);}
    .badge-agendado{background:rgba(100,120,255,.12);color:#8899ff;border:1px solid rgba(100,120,255,.2);}
    .badge-rejeitado{background:var(--accent-red-dim);color:var(--accent-red);border:1px solid rgba(255,68,102,.2);}
    .badge-publicado{background:var(--accent-purple-dim);color:var(--accent-purple);border:1px solid rgba(176,108,255,.2);}

    /* TWO-COL */
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px;}
    .three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:20px;}

    /* ACTIVITY */
    .activity-item{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--border-subtle);}
    .activity-item:last-child{border-bottom:none;}
    .activity-icon{font-size:16px;flex-shrink:0;margin-top:1px;}
    .activity-title{font-size:13px;color:var(--text-secondary);line-height:1.4;}
    .activity-time{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);margin-top:3px;}

    /* PROGRESS */
    .progress-wrap{margin-bottom:16px;}
    .progress-header{display:flex;justify-content:space-between;margin-bottom:6px;}
    .progress-label{font-size:12px;color:var(--text-secondary);}
    .progress-val{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);}
    .progress-bar{height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;}
    .progress-fill{height:100%;background:var(--accent-green);border-radius:2px;transition:width 1s ease;}
    .progress-fill.orange{background:var(--accent-orange);}
    .progress-fill.blue{background:var(--accent-blue);}
    .code-note{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);margin-top:16px;line-height:1.6;}

    /* TABS */
    .tabs{display:flex;gap:8px;margin-bottom:20px;}
    .tab-btn{padding:8px 18px;border-radius:var(--radius-sm);font-family:var(--font-body);font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text-muted);transition:all 200ms ease;}
    .tab-btn:hover{color:var(--text-primary);border-color:rgba(255,255,255,.16);}
    .tab-btn.active{background:var(--accent-green-dim);color:var(--accent-green);border-color:rgba(0,255,136,.3);}

    /* FORM */
    .form-group{margin-bottom:18px;}
    .form-label{display:block;font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px;font-family:var(--font-mono);}
    .form-input{width:100%;padding:10px 14px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);font-family:var(--font-body);font-size:13px;outline:none;transition:border-color 200ms ease,box-shadow 200ms ease;}
    .form-input:focus{border-color:rgba(0,255,136,.4);box-shadow:0 0 0 3px rgba(0,255,136,.08);}
    .form-input::placeholder{color:var(--text-muted);}
    .form-textarea{width:100%;padding:10px 14px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);font-family:var(--font-body);font-size:13px;outline:none;resize:vertical;min-height:90px;transition:border-color 200ms ease,box-shadow 200ms ease;}
    .form-textarea:focus{border-color:rgba(0,255,136,.4);box-shadow:0 0 0 3px rgba(0,255,136,.08);}
    .form-textarea::placeholder{color:var(--text-muted);}
    .info-box{background:rgba(0,255,136,.04);border:1px solid rgba(0,255,136,.12);border-radius:var(--radius-sm);padding:12px 16px;font-size:12px;color:var(--text-muted);line-height:1.6;margin-bottom:20px;}
    .info-box strong{color:var(--accent-green);}
    .warn-box{background:rgba(255,140,66,.04);border:1px solid rgba(255,140,66,.15);border-radius:var(--radius-sm);padding:12px 16px;font-size:12px;color:rgba(255,180,100,.8);line-height:1.6;margin-bottom:20px;}

    /* QUEUE CARDS */
    .queue-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;}
    .queue-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:border-color 250ms ease,transform 250ms ease;animation:fadeInCard .35s ease both;}
    .queue-card:hover{border-color:rgba(255,255,255,.14);transform:translateY(-2px);}
    .queue-card.status-pendente{border-left:3px solid var(--accent-orange);}
    .queue-card.status-gerando{border-left:3px solid #ffb347;}
    .queue-card.status-aprovado{border-left:3px solid var(--accent-green);}
    .queue-card.status-agendado{border-left:3px solid #8899ff;}
    .queue-card.status-rejeitado{border-left:3px solid var(--accent-red);}
    .queue-preview{width:100%;height:180px;object-fit:cover;display:block;background:rgba(255,255,255,.04);}
    .queue-preview-placeholder{width:100%;height:180px;background:rgba(255,255,255,.03);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;}
    .queue-preview-placeholder-icon{font-size:32px;opacity:.3;}
    .queue-preview-placeholder-text{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);}
    .queue-body{padding:16px;}
    .queue-meta{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
    .queue-theme{font-size:13px;font-weight:600;color:var(--text-primary);margin-bottom:6px;line-height:1.4;}
    .queue-date{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);margin-bottom:14px;}
    .queue-actions{display:flex;gap:8px;}
    .queue-spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,180,55,.3);border-top-color:#ffb347;border-radius:50%;animation:spin .8s linear infinite;margin-right:4px;vertical-align:middle;}

    /* MODAL */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:200;animation:fadeInCard .2s ease both;}
    .modal-box{background:#0f0f1a;border:1px solid rgba(255,255,255,.12);border-radius:var(--radius-lg);padding:32px;width:420px;max-width:95vw;animation:fadeInCard .25s ease both;}
    .modal-title{font-family:var(--font-display);font-size:18px;font-weight:700;color:var(--text-primary);margin-bottom:6px;letter-spacing:-.4px;}
    .modal-sub{font-size:12px;color:var(--text-muted);margin-bottom:24px;}
    .modal-actions{display:flex;gap:10px;margin-top:24px;}
    .datetime-input{width:100%;padding:10px 14px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);font-family:var(--font-body);font-size:13px;outline:none;transition:border-color 200ms ease;color-scheme:dark;}
    .datetime-input:focus{border-color:rgba(0,255,136,.4);box-shadow:0 0 0 3px rgba(0,255,136,.08);}

    /* SETTINGS */
    .status-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:10px;vertical-align:middle;}
    .dot-green{background:var(--accent-green);box-shadow:0 0 6px var(--accent-green-glow);}
    .dot-dim{background:rgba(255,255,255,.2);}
    .dot-red{background:var(--accent-red);}
    .dot-orange{background:var(--accent-orange);}
    .integration-item{display:flex;justify-content:space-between;align-items:center;padding:13px 0;border-bottom:1px solid var(--border-subtle);font-size:13px;}
    .integration-item:last-child{border-bottom:none;}
    .integration-name{font-weight:500;}
    .integration-note{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);}

    /* TOAST */
    .toast{position:fixed;bottom:28px;right:28px;background:rgba(20,20,30,.96);border:1px solid rgba(255,255,255,.12);border-radius:var(--radius-md);padding:14px 22px;font-size:13px;color:var(--text-primary);backdrop-filter:blur(20px);box-shadow:0 8px 40px rgba(0,0,0,.5);animation:slideInToast .3s ease;z-index:300;max-width:380px;line-height:1.5;}

    /* EMPTY STATE */
    .empty-state{text-align:center;padding:60px 20px;color:var(--text-muted);}
    .empty-icon{font-size:48px;margin-bottom:16px;opacity:.4;}
    .empty-title{font-family:var(--font-display);font-size:16px;color:var(--text-secondary);margin-bottom:8px;}
    .empty-sub{font-family:var(--font-mono);font-size:12px;}

    /* ── MÉTRICAS ── */
    .metrics-kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px;}
    .kpi-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;position:relative;overflow:hidden;transition:border-color 250ms ease,transform 250ms ease;animation:fadeInCard .4s ease both;}
    .kpi-card:hover{border-color:rgba(255,255,255,.14);transform:translateY(-2px);}
    .kpi-card .kpi-icon{font-size:22px;margin-bottom:10px;display:block;}
    .kpi-label{font-family:var(--font-mono);font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;}
    .kpi-value{font-family:var(--font-display);font-size:28px;font-weight:800;color:var(--text-primary);letter-spacing:-1px;line-height:1;}
    .kpi-value.loading{font-size:20px;color:var(--text-muted);}
    .kpi-delta{font-size:11px;margin-top:4px;}
    .kpi-delta.up{color:var(--accent-green);}
    .kpi-delta.down{color:var(--accent-red);}
    .kpi-delta.neutral{color:var(--text-muted);}

    .bar-chart-wrap{margin-top:8px;}
    .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
    .bar-label{font-size:11px;color:var(--text-secondary);width:140px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .bar-track{flex:1;height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;}
    .bar-fill{height:100%;border-radius:3px;transition:width 1.2s ease;}
    .bar-val{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);width:52px;text-align:right;flex-shrink:0;}

    .post-table-wrap{overflow-x:auto;}
    .post-table{width:100%;border-collapse:collapse;font-size:12px;}
    .post-table th{font-family:var(--font-mono);font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);}

      .three-col{grid-template-columns:1fr 1fr;}
      .agent-cards{grid-template-columns:1fr;}
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

/* ── WEBHOOKS ── */
const N8N_BASE = 'https://facilzap.app.n8n.cloud/webhook';
const WEBHOOKS = {
  triggerVideo:   `${N8N_BASE}/gerar-video`,
  triggerPost:    `${N8N_BASE}/gerar-post`,
  getCalendar:    `${N8N_BASE}/calendario`,
  getQueue:       `${N8N_BASE}/fila-revisao`,
  aprovar:        `${N8N_BASE}/aprovar-conteudo`,
  rejeitar:       `${N8N_BASE}/rejeitar-conteudo`,
  agendar:        `${N8N_BASE}/agendar-conteudo`,
  metricas:       `${N8N_BASE}/metricas-instagram`,
  agente:         `${N8N_BASE}/agente-social-media`,
};

/* ── FILA LOCAL ── */
const STORAGE_KEY = 'facilzap_queue_v2';
const METRICS_CACHE_KEY = 'facilzap_metrics_cache';
const getLocalQueue = () => { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch(e) { return []; } };
const saveLocalQueue = (q) => localStorage.setItem(STORAGE_KEY, JSON.stringify(q));
const addToQueue = (item) => saveLocalQueue([...getLocalQueue(), item]);
const updateQueueItem = (id, updates) => saveLocalQueue(getLocalQueue().map(i => i.id === id ? {...i,...updates} : i));

/* ── ACTIVITY FEED dinamico ── */
function buildActivityFeed() {
  const queue = getLocalQueue();
  const feed = [];
  const sorted = [...queue].sort((a,b) => new Date(b.criado_em||0) - new Date(a.criado_em||0));
  sorted.slice(0, 8).forEach(item => {
    const tipo = item.tipo === 'video' ? 'Vídeo' : 'Post';
    const tema = item.tema ? `"${item.tema.substring(0,32)}${item.tema.length>32?'…':''}"` : '';
    const when = item.criado_em ? timeAgo(item.criado_em) : '';
    if (item.status === 'publicado') feed.push({ icon:'🚀', title:`${tipo} ${tema} publicado no Instagram`, time: when });
    else if (item.status === 'aprovado') feed.push({ icon:'✅', title:`${tipo} ${tema} aprovado para agendamento`, time: when });
    else if (item.status === 'rejeitado') feed.push({ icon:'🚫', title:`${tipo} ${tema} rejeitado`, time: when });
    else if (item.status === 'agendado') feed.push({ icon:'🐅', title:`${tipo} ${tema} agendado`, time: when });
    else if (item.status === 'pendente') feed.push({ icon:'🎬', title:`${tipo} ${tema} pronto para revisão', time: when });
    else if (item.status === 'gerando') feed.push({ icon:'⚙~️', title:`Gerando ${tipo.toLowerCase()} ${tema}…`, time: when });
  });
  return feed.length ? feed : [{ icon:'💡', title:'Gere seu primeiro conteúdo para ver atividade aqui', time: '' }];
}

function timeAgo(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1) return 'Agora';
  if (m < 60) return `Há ${m} min`;
  const h = Math.floor(m / 60);
  if (h < 24) return `Há ${h}h`;
  const d = Math.floor(h / 24);
  if (d === 1) return 'Ontem';
  return `Há ${d} dias`;
}

function fmtNum(n) {
  if (n === null || n === undefined) return '--';
  if (n >= 1000000) return (n/1000000).toFixed(1)+'M';
  if (n >= 1000) return (n/1000).toFixed(1)+'k';
  return String(n);
}

/* ── COUNT-UP ── */
function useCountUp(target, duration=1400) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    if (!target || target === '--') return;
    let frame=0;
    const totalFrames = Math.round(duration/16);
    const timer = setInterval(() => {
      frame++;
      const eased = 1 - Math.pow(1 - frame/totalFrames, 3);
      setVal(Math.min(target, Math.round(target * eased)));
      if (frame >= totalFrames) clearInterval(timer);
    }, 16);
    return () => clearInterval(timer);
  }, [target]);
  return val;
}

/* ════════════════════════════════════════
   SIDEBAR
════════════════════════════════════════ */
function Sidebar({ active, setActive, queueCounts }) {
  const mainItems = [
    { id:'dashboard', icon:'◈', label:'Dashboard'      },
    { id:'calendar',  icon:'▦', label:'Calendário'     },
    { id:'generate',  icon:'⊕', label:'Gerar Conteúdo' },
  ];
  const contentItems = [
    { id:'videos',   icon:'▷', label:'Vídeos',  badge: queueCounts.videos },
    { id:'posts',    icon:'⊞', label:'Posts',   badge: queueCounts.posts  },
  ];
  const analyticsItems = [
    { id:'metricas', icon:'◎', label:'Métricas' },
    { id:'agente',   icon:'✦', label:'Agente IA'},
  ];
  const systemItems = [
    { id:'settings', icon:'⊛', label:'Configurações' },
  ];
  const renderItems = (items) => items.map(item => (
    <div key={item.id} className={`nav-item${active===item.id?' active':''}`} onClick={() => setActive(item.id)}>
      <span className="nav-icon" style={{fontFamily:'var(--font-mono)"}}>{item.icon}</span>
      <span>{item.label}</span>
      {item.badge > 0 && <span className="nav-badge">{item.badge}</span>}
    </div>
  ));
  return (
    <div className="sidebar">
      <div className="logo-area">
        <div className="logo-row">
          <span className="logo-icon">⚡</span>
          <span className="logo-text">AgênciaFacilZap</span>
        </div>
        <div className="logo-sub">// painel de automação</div>
      </div>
      <nav className="nav">
        <div className="nav-group-label">Principal</div>
        {renderItems(mainItems)}
        <div className="nav-group-label">Conteúdo</div>
        {renderItems(contentItems)}
        <div className="nav-group-label">Análise</div>
        {renderItems(analyticsItems)}
        <div className="nav-group-label">Sistema</div>
        {renderItems(systemItems)}
      </nav>
      <div className="sidebar-footer">
        <div><span className="status-pulse"/>sistema ativo</div>
        <div style={{marginTop:4,fontSize:10}}>n8n · online</div>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════
   STAT CARD
════════════════════════════════════════ */
function StatCard({ label, numValue, suffix='', change, delay=0, loading=false }) {
  const count = useCountUp(numValue, 1400+delay);
  return (
    <div className="stat-card" style={{animationDelay:`${delay}ms`}}>
      <div className="stat-label">{label}</div>
      <div className={`stat-value${loading?' loading':''}`}>
        {loading ? '—' : `${count}${suffix}`}
      </div>
      <div className="stat-change">
        {change && change.startsWith('↑') ? <span className="up">{change}</span> :
         change && change.startsWith('↓') ? <span className="down">{change}</span> : change}
      </div>
    </div>
  );
}

/* ════════════════════════════════════════
   DASHBOARD
════════════════════════════════════════ */
function Dashboard({ setActive, toast }) {
  const [stats, setStats] = useState(null);
  const [calData, setCalData] = useState([]);
  const [loadingStats, setLoadingStats] = useState(true);
  const [loadingCal, setLoadingCal] = useState(true);

  useEffect(() => {
    // Tentar buscar métricas reais
    fetch(WEBHOOKS.metricas, { method:'GET', signal: AbortSignal.timeout(6000) })
      .then(r => r.ok ? r.json() : null)
      .then(data => {
        if (data) setStats(data);
      })
      .catch(() => {})
      .finally(() => setLoadingStats(false));

    // Tentar buscar calendário real
    fetch(WEBHOOKS.getCalendar, { method:'GET', signal: AbortSignal.timeout(6000) })
      .then(r => r.ok ? r.json() : null)
      .then(data => {
        if (data) {
          const items = Array.isArray(data) ? data : (data.items || data.data || []);
          if (items.length) setCalData(items.slice(0,4));
        }
      })
      .catch(() => {})
      .finally(() => setLoadingCal(false));
  }, []);

  // Queue stats reais
  const queue = getLocalQueue();
  const publicados = queue.filter(i => i.status === 'publicado');
  const aprovados = queue.filter(i => i.status === 'aprovado' || i.status === 'agendado');
  const videosPublicados = stats?.videos_publicados ?? publicados.filter(i=>i.tipo==='video').length;
  const postsPublicados = stats?.posts_publicados ?? publicados.filter(i=>i.tipo==='post').length;
  const alcance = stats?.alcance_total ?? null;
  const seguidores = stats?.seguidores ?? null;

  const activity = buildActivityFeed();

  const calDisplay = calData.length > 0 ? calData : [];

  return (
    <>
      <div className="stats-grid">
        <StatCard label="🎬  VÍDEOS PUBLICADOS" numValue={videosPublicados} change={videosPublicados>0?`↑ ${videosPublicados} total`:'—'} delay={0} loading={loadingStats && !stats}/>
        <StatCard label="🖼️  POSTS PUBLICADOS" numValue={postsPublicados} change={postsPublicados>0?`↑ ${postsPublicados} total`:'—'} delay={80} loading={loadingStats && !stats}/>
        <StatCard label="👁  ALCANCE TOTAL" numValue={alcance||0} suffix={alcance&&alcance>=1000?'':''}
          change={alcance ? `↑ do Instagram` : '— conectar Instagram'} delay={160} loading={loadingStats && !stats}/>
        <StatCard label="👥  SEGUIDORES" numValue={seguidores||0}
          change={seguidores ? `↑ conta ativa` : '— conectar Instagram'} delay={240} loading={loadingStats && !stats}/>
      </div>

      {!loadingStats && !stats && (
        <div className="warn-box" style={{marginBottom:20}}>
          ⚠️ <strong style={{color:'var(--accent-orange)'}}>Instagram não conectado</strong> — os números acima refletem apenas dados locais da fila.
          Vá em <span style={{cursor:'pointer',textDecoration:'underline',color:'var(--accent-orange)'}} onClick={()=>setActive('settings')}>Configurações</span> para conectar o Instagram Graph API.
        </div>
      )}

      <div className="section-header">
        <span className="section-title">Próximos conteúdos</span>
        <button className="btn btn-secondary btn-sm" onClick={() => setActive('calendar')}>
          Ver calendário completo →
        </button>
      </div>

      <div className="card" style={{padding:0,overflow:'hidden',marginBottom:0}}>
        {loadingCal ? (
          <div style={{padding:'24px',fontFamily:'var(--font-mono)',fontSize:11,color:'var(--text-muted)'}}>// carregando calendário…</div>
        ) : calDisplay.length === 0 ? (
          <div style={{padding:'24px',fontFamily:'var(--font-mono)',fontSize:11,color:'var(--text-muted)'}}>// nenhum conteúdo agendado — adicione temas no Calendário</div>
        ) : (
          <table className="calendar-table">
            <thead><tr>
              <th style={{paddingLeft:22}}>Data</th><th>Tipo</th><th>Tema</th><th>Status</th><th style={{paddingRight:22}}>Ação</th>
            </tr></thead>
            <tbody>
              {calDisplay.map((row,i) => (
                <tr key={i}>
                  <td className="date-cell" style={{paddingLeft:22}}>{row.date||row.data||'—'} {row.day&&`· ${row.day}`}</td>
                  <td><span className={`badge badge-${row.type||row.tipo||'post'}`}>{(row.type||row.tipo)==='video'?'▷ Vídeo':'⊞ Post'}</span></td>
                  <td style={{color:'var(--text-secondary)',maxWidth:280}}>{row.theme||row.tema||'—'}</td>
                  <td><span className={`badge badge-${row.status||'pending'}`}>{row.status==='done'?'✓ Feito':row.status||'Pendente'}</span></td>
                  <td style={{paddingRight:22}}>
                    <button className="btn btn-primary btn-sm" onClick={() => setActive('generate')}>Gerar</button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>

      <div className="two-col">
        <div className="card">
          <div className="card-title">Atividade recente</div>
          {activity.map((a,i) => (
            <div className="activity-item" key={i}>
              <div className="activity-icon">{a.icon}</div>
              <div>
                <div className="activity-title">{a.title}</div>
                {a.time && <div className="activity-time">{a.time}</div>}
              </div>
            </div>
          ))}
        </div>
        <div className="card">
          <div className="card-title">Status da fila de conteúdo</div>
          {(() => {
            const all = getLocalQueue();
            const statuses = [
              { key:'gerando',   label:'Gerando',   color:'orange' },
              { key:'pendente',  label:'Aguardando revisão', color:'' },
              { key:'aprovado',  label:'Aprovados', color:'' },
              { key:'agendado',  label:'Agendados', color:'blue' },
              { key:'publicado', label:'Publicados',color:'' },
              { key:'rejeitado', label:'Rejeitados',color:'orange' },
            ];
            const total = all.length || 1;
            return statuses.map(s => {
              const cnt = all.filter(i=>i.status===s.key).length;
              return (
                <div className="progress-wrap" key={s.key}>
                  <div className="progress-header">
                    <span className="progress-label">{s.label}</span>
                    <span className="progress-val">{cnt}</span>
                  </div>
                  <div className="progress-bar">
                    <div className={`progress-fill${s.color?' '+s.color:''}`} style={{width:`${Math.round(cnt/total*100)}%`}}/>
                  </div>
                </div>
              );
            });
          })()}
          <div className="code-note">// total: {getLocalQueue().length} item(s) na fila</div>
        </div>
      </div>
    </>
  );
}

/* ════════════════════════════════════════
   CALENDÁRIO
════════════════════════════════════════ */
function Calendar({ toast }) {
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);
  const [newTheme, setNewTheme] = useState('');
  const [newDate, setNewDate] = useState('');
  const [newType, setNewType] = useState('video');

  useEffect(() => {
    fetch(WEBHOOKS.getCalendar, { method:'GET', signal: AbortSignal.timeout(6000) })
      .then(r => r.ok ? r.json() : null)
      .then(data => {
        if (data) {
          const arr = Array.isArray(data) ? data : (data.items||data.data||[]);
          setItems(arr.map((r,i) => ({...r, _id: r.id||r._id||i, status:r.status||'pending'})));
        } else {
          setItems([]);
        }
      })
      .catch(() => setItems([]))
      .finally(() => setLoading(false));
  }, []);

  const toggle = (id) => setItems(prev => prev.map(i => i._id===id ? {...i,status:i.status==='pending'?'done':'pending'} : i));

  const addItem = () => {
    if (!newTheme || !newDate) { toast('Preencha tema e data'); return; }
    const item = { _id: Date.now(), date: newDate, type: newType, theme: newTheme, status:'pending' };
    setItems(prev => [...prev, item]);
    setNewTheme(''); setNewDate('');
    toast('Item adicionado ao calendário');
  };

  return (
    <>
      <div className="section-header">
        <span className="section-title">Calendário Editorial</span>
      </div>
      {loading ? (
        <div className="card"><div style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--text-muted)'}}>// carregando agenda do n8n…</div></div>
      ) : (
        <>
          <div className="card" style={{marginBottom:20}}>
            <div className="card-title">Adicionar conteúdo</div>
            <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
              <input className="form-input" style={{flex:1,minWidth:160}} placeholder="Tema do conteúdo" value={newTheme} onChange={e=>setNewTheme(e.target.value)} />
              <input className="form-input" style={{width:140}} type="date" value={newDate} onChange={e=>setNewDate(e.target.value)} />
              <select className="form-input" style={{width:120}} value={newType} onChange={e=>setNewType(e.target.value)}>
                <option value="video">Vídeo</option>
                <option value="post">Post</option>
              </select>
              <button className="btn btn-primary" onClick={addItem}>+ Adicionar</button>
            </div>
          </div>
          {items.length === 0 ? (
            <div className="empty-state">
              <div className="empty-icon">📅</div>
              <div className="empty-title">Calendário vazio</div>
              <div className="empty-sub">// adicione temas acima ou configure o n8n para importar sua agenda</div>
            </div>
          ) : (
            <div className="card" style={{padding:0,overflow:'hidden'}}>
              <table className="calendar-table">
                <thead><tr>
                  <th style={{paddingLeft:22}}>Data</th>
                  <th>Tipo</th><th>Tema</th><th>Status</th>
                  <th style={{paddingRight:22}}>Ações</th>
                </tr></thead>
                <tbody>
                  {items.map(row => (
                    <tr key={row._id}>
                      <td className="date-cell" style={{paddingLeft:22}}>{row.date||row.data||'—'}</td>
                      <td><span className={`badge badge-${row.type||row.tipo||'post'}`}>{(row.type||row.tipo)==='video'?'▷ Vídeo':'⊞ Post'}</span></td>
                      <td style={{maxWidth:260,color:'var(--text-secondary)'}}>{row.theme||row.tema||'—'}</td>
                      <td><span className={`badge ${row.status==='done'?'badge-done':'badge-pending'}`}>{row.status==='done'?'✓ Feito':'Pendente'}</span></td>
                      <td style={{paddingRight:22}}>
                        <div style={{display:'flex',gap:6}}>
                          <button className="btn btn-primary btn-sm" onClick={() => toast(`Tema "${(row.theme||row.tema||'').substring(0,28)}" → Gerar Conteúdo`)}>Gerar</button>
                          <button className="btn btn-secondary btn-sm" onClick={() => toggle(row._id)}>✏</button>
                        </div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </>
      )}
    </>
  );
}

/* ════════════════════════════════════════
   GERAR CONTEÚDO
════════════════════════════════════════ */
function Generate({ toast, setActive }) {
  const [tab, setTab]     = useState('video');
  const [theme, setTheme] = useState('');
  const [kws, setKws]     = useState('');
  const [extra, setExtra] = useState('');
  const [loading, setLoading] = useState(false);

  const submit = async () => {
    if (!theme.trim()) { toast('Informe o tema do conteúdo'); return; }
    setLoading(true);
    const id = `${tab}_${Date.now()}`;
    const item = { id, tipo: tab, tema: theme, status:'gerando', criado_em: new Date().toISOString() };
    addToQueue(item);
    try {
      const url = tab === 'video' ? WEBHOOKS.triggerVideo : WEBHOOKS.triggerPost;
      const resp = await fetch(url, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ id, tema: theme, keywords: kws, instrucoes: extra })
      });
      if (resp.ok) {
        toast(`✅ ${tab==='video'?'Vídeo':'Post'} em geração! Acompanhe na aba ${tab==='video'?'Vídeos':'Posts'}.`);
        setTheme(''); setKws(''); setExtra('');
        setTimeout(() => setActive(tab==='video'?'videos':'posts'), 1800);
      } else {
        throw new Error('n8n retornou ' + resp.status);
      }
    } catch(e) {
      updateQueueItem(id, { status:'pendente' });
      toast(`⚠️ Erro ao contatar n8n. Verifique se o workflow está ativo.`);
    }
    setLoading(false);
  };

  return (
    <>
      <div className="tabs">
        <button className={`tab-btn${tab==='video'?' active':''}`} onClick={()=>setTab('video')}>▷ Gerar Vídeo (Reels)</button>
        <button className={`tab-btn${tab==='post'?' active':''}`} onClick={()=>setTab('post')}>⊞ Gerar Post (Imagem)</button>
      </div>
      <div style={{maxWidth:600}}>
        <div className="card">
          <div className="card-title">Gerar {tab==='video'?'Vídeo com Avatar do Ednardo':'Post de Imagem'}</div>
          <div className="form-group">
            <label className="form-label">Tema do conteúdo ★</label>
            <input className="form-input" value={theme} onChange={e=>setTheme(e.target.value)}
              placeholder={tab==='video'?"Como automatizar o WhatsApp da sua empresa":"5 vantagens do atendimento automatizado"} />
          </div>
          <div className="form-group">
            <label className="form-label">Palavras-chave</label>
            <input className="form-input" value={kws} onChange={e=>setKws(e.target.value)} placeholder="automação, WhatsApp, vendas, PME" />
          </div>
          <div className="form-group">
            <label className="form-label">Instruções para o GPT-4o</label>
            <textarea className="form-textarea" value={extra} onChange={e=>setExtra(e.target.value)}
              placeholder="Ex: Foque no público de restaurantes. Tom mais informal. Incluir chamada para testar grátis." />
          </div>
          <div className="info-box">
            <strong>Fluxo com revisão:</strong> GPT-4o gera script → {tab==='video'?'HeyGen cria avatar → Creatomate finaliza → ':'IA gera imagem → '}Você revisa e agenda → Publica no Instagram {tab==='video'?'Reels':'Feed'}
          </div>
          <button className="btn btn-primary" onClick={submit} disabled={loading} style={{width:'100%',justifyContent:'center',padding:'12px'}}>
            {loading ? <><span className="queue-spinner"/>Enviando para n8n…</> : `Gerar para Revisão — ${tab==='video'?'Vídeo':'Post'}`}
          </button>
        </div>
      </div>
    </>
  );
}

/* ════════════════════════════════════════
   CONTENT QUEUE (Vídeos / Posts)
════════════════════════════════════════ */
function ContentQueue({ tipo, toast }) {
  const [queue, setQueue] = useState([]);
  const [tab, setTab] = useState('revisao');
  const [scheduling, setScheduling] = useState(null);
  const [schedTime, setSchedTime] = useState('');
  const [lastSync, setLastSync] = useState(null);

  const reload = useCallback(async () => {
    let local = getLocalQueue();
    try {
      const resp = await fetch(WEBHOOKS.getQueue, { method:'GET', signal: AbortSignal.timeout(5000) });
      if (resp.ok) {
        const data = await resp.json();
        const n8nItems = Array.isArray(data) ? data : (data.items||data.data||[]);
        n8nItems.forEach(n8nItem => {
          const id = n8nItem.item_id;
          if (!id) return;
          const existing = local.find(i => i.id === id);
          if (!existing) {
            local = [...local, { id, tipo: n8nItem.tipo||'video', tema: n8nItem.tema||'', status: n8nItem.status||'pendente', url: n8nItem.url||null, criado_em: n8nItem.criado_em||new Date().toISOString() }];
          } else if (existing.status==='gerando' && n8nItem.status==='pendente') {
            local = local.map(i => i.id===id ? {...i, status:'pendente', url: n8nItem.url||i.url} : i);
          }
        });
        saveLocalQueue(local);
        setLastSync(new Date());
      }
    } catch(_) {}
    setQueue(local.filter(i => i.tipo === tipo));
  }, [tipo]);

  useEffect(() => { reload(); const t = setInterval(reload, 5000); return () => clearInterval(t); }, [reload]);

  const aprovar = (id) => {
    updateQueueItem(id, { status:'aprovado' });
    fetch(WEBHOOKS.aprovar, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({item_id:id}) }).catch(()=>{});
    toast('✅ Conteúdo aprovado!');
    reload();
  };
  const rejeitar = (id) => {
    updateQueueItem(id, { status:'rejeitado' });
    fetch(WEBHOOKS.rejeitar, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({item_id:id}) }).catch(()=>{});
    toast('🚫 Conteúdo rejeitado');
    reload();
  };
  const agendar = async (id) => {
    if (!schedTime) { toast('Selecione data e horário'); return; }
    updateQueueItem(id, { status:'agendado', agendado_para: schedTime });
    try {
      await fetch(WEBHOOKS.agendar, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({item_id:id, agendado_para:schedTime}) });
    } catch(_) {}
    toast('📅 Conteúdo agendado!');
    setScheduling(null);
    reload();
  };

  const revisao   = queue.filter(i => ['gerando','pendente'].includes(i.status));
  const aprovados = queue.filter(i => ['aprovado','agendado'].includes(i.status));
  const historico = queue.filter(i => ['rejeitado','publicado'].includes(i.status));
  const display   = tab==='revisao' ? revisao : tab==='aprovados' ? aprovados : historico;

  return (
    <>
      {scheduling && (
        <div className="modal-overlay" onClick={()=>setScheduling(null)}>
          <div className="modal-box" onClick={e=>e.stopPropagation()}>
            <div className="modal-title">Agendar publicação</div>
            <div className="modal-sub">Escolha data e horário para publicar no Instagram</div>
            <div className="form-group">
              <label className="form-label">Data e horário</label>
              <input className="datetime-input" type="datetime-local" value={schedTime} onChange={e=>setSchedTime(e.target.value)} />
            </div>
            <div className="modal-actions">
              <button className="btn btn-primary" onClick={() => agendar(scheduling)}>Confirmar agendamento</button>
              <button className="btn btn-secondary" onClick={()=>setScheduling(null)}>Cancelar</button>
            </div>
          </div>
        </div>
      )}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <div className="tabs" style={{marginBottom:0}}>
          <button className={`tab-btn${tab==='revisao'?' active':''}`} onClick={()=>setTab('revisao')}>
            🔍 Fila de Revisão {revisao.length>0&&<span style={{marginLeft:4,background:'var(--accent-orange)',color:'#000',borderRadius:10,padding:'1px 6px',fontSize:10,fontWeight:700}}>{revisao.length}</span>}
          </button>
          <button className={`tab-btn${tab==='aprovados'?' active':''}`} onClick={()=>setTab('aprovados')}>
            ✅ {tipo==='video'?'Vídeos':'Posts'} Aprovados/Agendados
          </button>
          <button className={`tab-btn${tab==='historico'?' active':''}`} onClick={()=>setTab('historico')}>
            📋 Histórico
          </button>
        </div>
        {lastSync && <span style={{fontFamily:'var(--font-mono)',fontSize:10,color:'var(--text-muted)'}}>sync {lastSync.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}</span>}
      </div>
      {display.length === 0 ? (
        <div className="empty-state">
          <div className="empty-icon">{tab==='revisao'?'🎬':tab==='aprovados'?'✅':'📋'}</div>
          <div className="empty-title">Nenhum conteúdo na fila</div>
          <div className="empty-sub">// {tab==='revisao'?`gere um ${tipo} na aba "Gerar Conteúdo" para revisar aqui`:tab==='aprovados'?'aprove conteúdos da fila de revisão':'sem histórico ainda'}</div>
        </div>
      ) : (
        <div className="queue-grid">
          {display.map(item => (
            <div key={item.id} className={`queue-card status-${item.status}`}>
              {item.url ? (
                tipo==='video'
                  ? <video className="queue-preview" src={item.url} controls muted/>
                  : <img className="queue-preview" src={item.url} alt={item.tema} onError={e=>{e.target.style.display='none';}}/>
              ) : (
                <div className="queue-preview-placeholder">
                  <div className="queue-preview-placeholder-icon">{tipo==='video'?'🎬':'🖼️'}</div>
                  {item.status==='gerando'
                    ? <div className="queue-preview-placeholder-text"><span className="queue-spinner"/>gerando conteúdo…</div>
                    : <div className="queue-preview-placeholder-text">preview não disponível</div>}
                </div>
              )}
              <div className="queue-body">
                <div className="queue-meta">
                  <span className={`badge badge-${item.status}`}>{item.status}</span>
                  <span className={`badge badge-${item.tipo}`}>{item.tipo==='video'?'▷ Vídeo':'⊞ Post'}</span>
                </div>
                <div className="queue-theme">{item.tema||'Sem tema'}</div>
                <div className="queue-date">{item.criado_em ? new Date(item.criado_em).toLocaleString('pt-BR') : '—'}</div>
                <div className="queue-actions">
                  {item.status==='pendente' && <>
                    {item.url && <a href={item.url} target="_blank" rel="noreferrer" className="btn btn-secondary btn-sm">👁 Ver</a>}
                    <button className="btn btn-approve btn-sm" onClick={()=>aprovar(item.id)}>✅ Aprovar</button>
                    <button className="btn btn-danger btn-sm" onClick={()=>rejeitar(item.id)}>✗ Rejeitar</button>
                  </>}
                  {item.status==='aprovado' && <>
                    {item.url && <a href={item.url} target="_blank" rel="noreferrer" className="btn btn-secondary btn-sm">👁 Ver</a>}
                    <button className="btn btn-primary btn-sm" onClick={()=>setScheduling(item.id)}>📅 Agendar</button>
                  </>}
                  {item.status==='agendado' && <span style={{fontFamily:'var(--font-mono)',fontSize:10,color:'#8899ff'}}>📅 {item.agendado_para?new Date(item.agendado_para).toLocaleString('pt-BR'):'agendado'}</span>}
                  {item.status==='gerando' && <span style={{fontFamily:'var(--font-mono)',fontSize:10,color:'#ffb347'}}><span className="queue-spinner"/>processando no n8n…</span>}
                  {item.status==='rejeitado' && <button className="btn btn-secondary btn-sm" onClick={()=>{updateQueueItem(item.id,{status:'pendente'});reload();}}>↩ Reenviar</button>}
                </div>
              </div>
            </div>
          ))}
        </div>
      )}
    </>
  );
}

/* ════════════════════════════════════════
   MÉTRICAS INSTAGRAM
════════════════════════════════════════ */
function Metricas({ toast }) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [lastUpdate, setLastUpdate] = useState(null);

  const fetchMetrics = useCallback(async () => {
    setLoading(true);
    try {
      // Checar cache (max 15min)
      const cached = localStorage.getItem(METRICS_CACHE_KEY);
      if (cached) {
        const { ts, d } = JSON.parse(cached);
        if (Date.now() - ts < 15 * 60 * 1000) {
          setData(d);
          setLastUpdate(new Date(ts));
          setLoading(false);
          return;
        }
      }
      const resp = await fetch(WEBHOOKS.metricas, { method:'GET', signal: AbortSignal.timeout(10000) });
      if (resp.ok) {
        const d = await resp.json();
        setData(d);
        setLastUpdate(new Date());
        localStorage.setItem(METRICS_CACHE_KEY, JSON.stringify({ ts: Date.now(), d }));
      } else {
        setData(null);
      }
    } catch(e) {
      setData(null);
    }
    setLoading(false);
  }, []);

  useEffect(() => { fetchMetrics(); }, [fetchMetrics]);

  const refresh = () => {
    localStorage.removeItem(METRICS_CACHE_KEY);
    fetchMetrics();
    toast('Atualizando métricas…');
  };

  // Dados de posts para tabela
  const posts = data?.posts || data?.top_posts || [];
  // Engajamento por tipo
  const byTipo = data?.por_tipo || null;
  // Heatmap (melhores horários): array [dom,seg,ter,qua,qui,sex,sab] com score 0-4
  const heatmap = data?.heatmap_dias || [1,3,2,4,3,2,1];
  const dias = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

  const maxReach = posts.length ? Math.max(...posts.map(p => p.alcance||p.reach||0), 1) : 1;
  const maxEng   = posts.length ? Math.max(...posts.map(p => p.engajamento||p.engagement||0), 1) : 1;

  if (loading) return (
    <div className="agent-loading">
      <div className="agent-spinner" style={{borderTopColor:'var(--accent-green)'}} />
      <div className="agent-loading-text">// buscando métricas do Instagram…</div>
    </div>
  );

  if (!data) return (
    <div className="connect-prompt">
      <div className="connect-icon">📊</div>
      <div className="connect-title">Instagram não conectado</div>
      <div className="connect-sub">
        Para ver métricas reais, conecte sua conta Instagram Business ao n8n via Instagram Graph API.
        O workflow <strong style={{color:'var(--text-primary)'}}>FacilZap - Métricas Instagram</strong> precisa estar ativo com seu token de acesso.
      </div>
      <div style={{display:'flex',gap:10,marginTop:8}}>
        <button className="btn btn-primary" onClick={refresh}>Tentar novamente</button>
        <a href="https://developers.facebook.com/docs/instagram-api" target="_blank" rel="noreferrer" className="btn btn-secondary btn-sm">Documentação API →</a>
      </div>
    </div>
  );

  return (
    <>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>
        <div>
          {lastUpdate && <span style={{fontFamily:'var(--font-mono)',fontSize:10,color:'var(--text-muted)'}}>// última atualização: {lastUpdate.toLocaleString('pt-BR')}</span>}
        </div>
        <button className="btn btn-secondary btn-sm" onClick={refresh}>↻ Atualizar métricas</button>
      </div>

      {/* KPIs principais */}
      <div className="metrics-kpi-grid">
        {[
          { icon:'👥', label:'Seguidores',          val: data.seguidores||data.followers,       delta: data.seguidores_delta||data.followers_delta },
          { icon:'👁',  label:'Alcance (7 dias)',    val: data.alcance_semana||data.reach_week,  delta: data.alcance_delta },
          { icon:'📈', label:'Impressões (7 dias)',  val: data.impressoes||data.impressions,     delta: data.impressoes_delta },
          { icon:'❤️', label:'Taxa de Engajamento',  val: data.taxa_engajamento!=null ? `${(data.taxa_engajamento*100).toFixed(1)}%` : null, delta: data.engajamento_delta },
          { icon:'🎬', label:'Reels publicados',     val: data.reels_total||data.videos_total,  delta: null },
          { icon:'🖼️', label:'Posts publicados',     val: data.posts_total||data.posts_count,   delta: null },
          { icon:'💬', label:'Comentários (7 dias)', val: data.comentarios||data.comments,      delta: null },
          { icon:'🔖', label:'Salvamentos (7 dias)', val: data.salvamentos||data.saves,         delta: null },
        ].map((k,i) => (
          <div className="kpi-card" key={i} style={{animationDelay:`${i*60}ms`}}>
            <span className="kpi-icon">{k.icon}</span>
            <div className="kpi-label">{k.label}</div>
            <div className={`kpi-value${k.val==null?' loading':''}`}>{k.val!=null ? (typeof k.val==='string'?k.val:fmtNum(k.val)) : '—'}</div>
            {k.delta!=null && <div className={`kpi-delta ${k.delta>=0?'up':'down'}`}>{k.delta>=0?'↑':'↓'} {Math.abs(k.delta)}% vs semana ant.</div>}
          </div>
        ))}
      </div>

      <div className="two-col">
        {/* Melhores horários */}
        <div className="card">
          <div className="card-title">Melhores dias para postar</div>
          <div style={{fontSize:11,color:'var(--text-muted)',fontFamily:'var(--font-mono)',marginBottom:12}}>// baseado no engajamento histórico</div>
          <div className="heatmap-days">
            {dias.map(d=><div key={d} className="heatmap-day">{d}</div>)}

          <div className="heatmap-grid">
            {heatmap.map((val,i) => (
              <div key={i} className={`heatmap-cell heat-${val}`} title={`${dias[i]}: score ${val}/4`}>
                {val >= 3 ? '🔥' : ''}

            ))}
          </div>
          <div style={{display:'flex',gap:8,marginTop:12,alignItems:'center'}}>
            {[0,1,2,3,4].map(v=>(
              <div key={v} style={{display:'flex',alignItems:'center',gap:4}}>
                <div style={{width:10,height:10,borderRadius:2,background:['rgba(255,255,255,.04)','rgba(0,255,136,.12)','rgba(0,255,136,.28)','rgba(0,255,136,.5)','rgba(0,255,136,.75)'][v]}}/>
                <span style={{fontSize:9,color:'var(--text-muted)',fontFamily:'var(--font-mono)'}}>{['nenhum','baixo','médio','bom','ótimo'][v]}</span>
              </div>
            ))}
          </div>
        </div>

        {/* Engajamento por tipo */}
        <div className="card">
          <div className="card-title">Engajamento por tipo de conteúdo</div>
          <div className="bar-chart-wrap">
            {(byTipo || [
              {label:'Reels / Vídeo', val: data.eng_reels||data.engagement_video||0, color:'var(--accent-blue)'},
              {label:'Post Imagem',   val: data.eng_post||data.engagement_post||0,   color:'var(--accent-green)'},
              {label:'Carrossel',     val: data.eng_carrossel||data.engagement_carousel||0, color:'var(--accent-orange)'},
              {label:'Stories',       val: data.eng_stories||data.engagement_stories||0, color:'var(--accent-purple)'},
            ]).map((t,i) => {
              const maxV = byTipo ? Math.max(...byTipo.map(x=>x.val),1) : Math.max(data.eng_reels||0,data.eng_post||0,data.eng_carrossel||0,data.eng_stories||0,1);
              const pct = Math.round((t.val||0)/maxV*100);
              return (
                <div className="bar-row" key={i}>
                  <div className="bar-label">{t.label}</div>
                  <div className="bar-track"><div className="bar-fill" style={{width:`${pct}%`,background:t.color||'var(--accent-green)'}}/></div>
                  <div className="bar-val">{fmtNum(t.val)}</div>
                </div>
              );
            })}
          </div>
          <div className="code-note">// curtidas + comentários + shares + saves</div>
        </div>
      </div>

      {/* Top posts */}
      {posts.length > 0 && (
        <div className="card" style={{marginTop:20}}>
          <div className="card-title">Posts com melhor desempenho</div>
          <div className="post-table-wrap">
            <table className="post-table">
              <thead><tr>
                <th style={{paddingLeft:14}}>Preview</th>
                <th>Tema / Legenda</th>
                <th>Tipo</th>
                <th>Alcance</th>
                <th>Curtidas</th>
                <th>Comentários</th>
                <th>Shares</th>
                <th>Saves</th>
                <th style={{paddingRight:14}}>Engajamento</th>
              </tr></thead>
              <tbody>
                {posts.slice(0,10).map((p,i) => (
                  <tr key={i}>
                    <td style={{paddingLeft:14}}>
                      {p.thumbnail||p.media_url
                        ? <img className="post-thumb" src={p.thumbnail||p.media_url} alt="" onError={e=>{e.target.style.display='none';}}/>

                    </td>
                    <td style={{maxWidth:200}}>{(p.caption||p.legenda||p.tema||'—').substring(0,60)}{(p.caption||p.legenda||p.tema||'').length>60?'…':''}</td>
                    <td><span className={`badge badge-${p.tipo||p.media_type||'post'}`}>{(p.tipo||p.media_type)==='VIDEO'||p.tipo==='video'?'▷ Reel':'⊞ Post'}</span></td>
                    <td style={{fontFamily:'var(--font-mono)',fontSize:11}}>{fmtNum(p.alcance||p.reach||0)}</td>
                    <td style={{fontFamily:'var(--font-mono)',fontSize:11}}>{fmtNum(p.curtidas||p.like_count||0)}</td>
                    <td style={{fontFamily:'var(--font-mono)',fontSize:11}}>{fmtNum(p.comentarios||p.comments_count||0)}</td>
                    <td style={{fontFamily:'var(--font-mono)',fontSize:11}}>{fmtNum(p.shares||p.share_count||0)}</td>
                    <td style={{fontFamily:'var(--font-mono)',fontSize:11}}>{fmtNum(p.saves||p.saved||0)}</td>
                    <td style={{paddingRight:14}}>
                      <div className="bar-row" style={{gap:6}}>
                        <div className="bar-track" style={{width:60}}><div className="bar-fill" style={{width:`${Math.round((p.engajamento||p.engagement||0)/maxEng*100)}%`,background:'var(--accent-purple)'}}/></div>
                        <div className="bar-val" style={{width:'auto'}}>{fmtNum(p.engajamento||p.engagement||0)}</div>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </>
  );
}

/* ════════════════════════════════════════

function Agente({ toast }) {
  const [analysis, setAnalysis] = useState(null);
  const [loading, setLoading] = useState(false);
  const [chatMsgs, setChatMsgs] = useState([
    { role:'agent', text:'Olá! Sou seu consultor de social media com IA. Clique em **Analisar meus dados** para receber uma análise completa da sua conta, ou me faça uma pergunta diretamente abaixo.' }
  ]);
  const [chatInput, setChatInput] = useState('');
  const [chatLoading, setChatLoading] = useState(false);
  const chatRef = useRef(null);

  useEffect(() => {
    if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
  }, [chatMsgs]);

  const analisar = async () => {
    setLoading(true);
    setAnalysis(null);
    try {
      // Pegar dados locais + cache de métricas para contexto
      const queue = getLocalQueue();
      const metricsCache = localStorage.getItem(METRICS_CACHE_KEY);
      const metrics = metricsCache ? JSON.parse(metricsCache).d : null;
      const context = {
        fila: queue.length,
        publicados: queue.filter(i=>i.status==='publicado').length,
        aprovados: queue.filter(i=>i.status==='aprovadMETRICS_CACHE_KEY);
      const metrics = metricsCache ? JSON.parse(metricsCache).d : null;
      const context = {
        fila: queue.length,
        publicados: queue.filter(i=>i.status==='publicado').length,
        aprovados: queue.filter(i=>i.status==='aprovado').length,
        tipos_gerados: {
          videos: queue.filter(i=>i.tipo==='video').length,
          posts: queue.filter(i=>i.tipo==='post').length,
        },
        temas: queue.slice(0,10).map(i=>i.tema).filter(Boolean),
        metricas: metrics,
      };
      const resp = await fetch(WEBHOOKS.agente, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ acao:'analisar', contexto: context }),
        signal: AbortSignal.timeout(30000)
      });
      if (resp.ok) {
        const data = await resp.json();
        setAnalysis(data);
      } else {
        throw new Error('n8n ' + resp.status);
      }
    } catch(e) {
      toast('⚠️ Agente indisponível. Verifique se o workflow está ativo.');
    }
    setLoading(false);
  };

  const sendChat = async () => {
    const msg = chatInput.trim();
    if (!msg) return;
    setChatInput('');
    setChatMsgs(prev => [...prev, { role:'user', text:msg }]);
    setChatLoading(true);
    try {
      const queue = getLocalQueue();
      const metricsCache = localStorage.getItem(METRICS_CACHE_KEY);
      const metrics = metricsCache ? JSON.parse(metricsCache).d : null;
      const resp = await fetch(WEBHOOKS.agente, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ acao:'chat', pergunta: msg, contexto: { metricas: metrics, temas: queue.slice(0,10).map(i=>i.tema).filter(Boolean) }}),
        signal: AbortSignal.timeout(30000)
      });
      if (resp.ok) {
        const d = await resp.json();
        const reply = d.resposta || d.answer || d.message || d.text || JSON.stringify(d);
        setChatMsgs(prev => [...prev, { role:'agent', text: reply }]);
      } else {
        throw new Error();
      }
    } catch(e) {
      setChatMsgs(prev => [...prev, { role:'agent', text:'Não consegui conectar ao agente. Verifique se o workflow **FacilZap - Agente Social Media** está publicado no n8n.' }]);
    }
    setChatLoading(false);
  };

  const formatAgentText = (text) => {
    // Simples: bold em **texto**
    return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  };

  return (
    <>
      <div className="agent-header">
        <div>
          <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:6}}>
            <span className="agent-badge">✦ GPT-4o Powered</span>
            <span className="agent-badge" style={{background:'var(--accent-green-dim)',color:'var(--accent-green)',borderColor:'rgba(0,255,136,.25)'}}>Especialista em Social Media</span>
          </div>
          <div style={{fontFamily:'var(--font-mono)',fontSize:10,color:'var(--text-muted)'}}>// analisa suas métricas e sugere estratégias de conteúdo</div>
        </div>
        <button className="btn btn-purple" onClick={analisar} disabled={loading}>
          {loading ? <><span className="queue-spinner" style={{borderTopColor:'var(--accent-purple)'}}/>Analisando…</> : '✦ Analisar meus dados'}
        </button>
      </div>

      {loading && (
        <div className="agent-loading">
          <div className="agent-spinner" />
          <div className="agent-loading-text">// agente analisando métricas e histórico de conteúdo…</div>
        </div>
      )}

      {analysis && !loading && (
        <div className="agent-cards">
          {[
            { icon:'📊', title:'Análise de Performance', key:'analise_performance', fallback: analysis.performance || analysis.analysis },
            { icon:'🎯', title:'Sugestões de Temas', key:'sugestoes_temas', fallback: analysis.topics || analysis.temas },
            { icon:'⏰', title:'Melhores Horários para Postar', key:'melhores_horarios', fallback: analysis.best_times || analysis.horarios },
            { icon:'💡', title:'Dicas de Engajamento', key:'dicas_engajamento', fallback: analysis.engagement_tips || analysis.dicas },
            { icon:'🚀', title:'Plano de Conteúdo Sugerido', key:'plano_conteudo', fallback: analysis.content_plan || analysis.plano },
            { icon:'⚠️', title:'Pontos de Atenção', key:'pontos_atencao', fallback: analysis.warnings || analysis.atencao },
          ].filter(c => {
            const val = analysis[c.key] || c.fallback;
            return val;
          }).map((card, i) => {
            const val = analysis[card.key] || card.fallback;
            const text = typeof val === 'string' ? val : Array.isArray(val) ? val.join('\n') : JSON.stringify(val, null, 2);
            return (
              <div className="agent-card" key={i} style={{animationDelay:`${i*80}ms`}}>
                <span className="agent-card-icon">{card.icon}</span>
                <div className="agent-card-title">{card.title}</div>
                <div className="agent-card-body" dangerouslySetInnerHTML={{__html: formatAgentText(text.replace(/\n/g,'<br/>'))}}/>
              </div>
            );
          })}
        </div>
      )}

      {/* Chat */}
      <div className="chat-box">
        <div className="chat-title">💬 Pergunte ao agente</div>
        <div className="chat-messages" ref={chatRef}>
          {chatMsgs.map((m,i) => (
            <div key={i} className={`chat-msg ${m.role}`} dangerouslySetInnerHTML={{__html: formatAgentText(m.text.replace(/\n/g,'<br/>'))}}/>
          ))}
          {chatLoading && <div className="chat-msg agent"><span className="queue-spinner" style={{borderTopColor:'var(--accent-purple)'}}/>pensando…</div>}
        </div>
        <div className="chat-input-row">
          <input className="chat-input" value={chatInput} onChange={e=>setChatInput(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&!e.shiftKey&&sendChat()}
            placeholder="Ex: Qual o melhor horário para postar Reels? Quais temas geram mais engajamento?" />
          <button className="btn btn-purple" onClick={sendChat} disabled={chatLoading}>Enviar</button>
        </div>
      </div>
    </>
  );
}

/* ════════════════════════════════════════
   CONFIGURAÇ��ES
════════════════════════════════════════ */
function Settings({ toast }) {
  const [n8nStatus, setN8nStatus] = useState('checking');
  const [metricsStatus, setMetricsStatus] = useState('checking');
  const [fields, setFields] = useState([
    { key:'ig_token',      label:'Instagram Access Token',    hint:'EAAxxxxx...',       val:'' },
    { key:'ig_account_id', label:'Instagram Account ID',      hint:'170000000000000',   val:'' },
    { key:'spreadsheet_id',label:'Google Sheets — Planilha ID', hint:'1rbCUzjipxXJ3…', val:'' },
  ]);

  useEffect(() => {
    // Testar n8n
    fetch(WEBHOOKS.getQueue, { method:'GET', signal: AbortSignal.timeout(5000) })
      .then(r => setN8nStatus(r.ok ? 'ok' : 'error'))
      .catch(() => setN8nStatus('error'));
    // Testar métricas
    fetch(WEBHOOKS.metricas, { method:'GET', signal: AbortSignal.timeout(5000) })
      .then(r => setMetricsStatus(r.ok ? 'ok' : 'error'))
      .catch(() => setMetricsStatus('error'));
    // Carregar valores salvos
    setFields(prev => prev.map(f => ({...f, val: localStorage.getItem('fz_'+f.key)||''})));
  }, []);

  const save = () => {
    fields.forEach(f => { if(f.val) localStorage.setItem('fz_'+f.key, f.val); });
    toast('✅ Configurações salvas localmente');
  };
  const f = { set:(key,val) => setFields(prev=>prev.map(fi=>fi.key===key?{...fi,val}:fi)) };

  const integrations = [
    { name:'n8n Cloud',          status:n8nStatus,    ok:n8nStatus==='ok',  note: n8nStatus==='checking'?'verificando…':n8nStatus==='ok'?'facilzap.app.n8n.cloud · ativo':'webhook não responde' },
    { name:'Fila de Revisão',    status:n8nStatus,    ok:n8nStatus==='ok',  note: n8nStatus==='ok'?'/fila-revisao · ativo':'erro — verificar workflow' },
    { name:'Métricas Instagram', status:metricsStatur,ok:metricsStatus==='ok',note: metricsStatus==='checking'?'verificando…':metricsStatus==='ok'?'/metricas-instagram · ativo':'não configurado — token necessário' },
    { name:'Instagram / Meta',   status:'manual',     ok:metricsStatus==='ok',note:'Aprovação manual ativada — sem auto-post' },
    { name:'OpenAI GPT-4o',      status:'ok',         ok:true,              note:'configurado via n8n' },
    { name:'HeyGen Avatar',      status:'ok',         ok:true,              note:'configurado via n8n' },
    { name:'Creatomate',         status:'ok',         ok:true,              note:'configurado via n8n' },
    { name:'Google Sheets',      status:'ok',         ok:true,              note:'planilha Fila de Revisão conectada' },
  ];

  const dotClass = (s) => s==='ok'?'dot-green':s==='error'?'dot-red':s==='checking'?'dot-orange':'dot-dim';

  return (
    <div style={{maxWidth:620}}>
      <div className="card">
        <div className="card-title">Configurações de integração</div>
        {fields.map(fi => (
          <div className="form-group" key={fi.key}>
            <label className="form-label">{fi.label}</label>
            <input className="form-input" type="password" value={fi.val}
              onChange={e => f.set(fi.key, e.target.value)} placeholder={fi.hint} />
          </div>
        ))}
        <div className="warn-box" style={{marginBottom:16,marginTop:4}}>
          ⚠️ Estes valores são salvos apenas no seu navegador. Para produção, configure diretamente nas variáveis de ambiente do n8n.
        </div>
        <button className="btn btn-primary" onClick={save}>Salvar configurações</button>
      </div>

      <div className="card" style={{marginTop:20}}>
        <div className="card-title">Status das integrações</div>
        {integrations.map((s,i) => (
          <div className="integration-item" key={i}>
            <div>
              <span className={`status-dot ${dotClass(s.status)}`}/>
              <span className="integration-name" style={{color:s.ok?'var(--text-primary)':'var(--text-secondary)'}}>{s.name}</span>
            </div>
            <span className="integration-note">{s.note}</span>
          </div>
        ))}
      </div>

      <div className="card" style={{marginTop:20}}>
        <div className="card-title">Fila de Conteúdo — Diagnóstico</div>
        <div style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--text-muted)',lineHeight:2}}>
          {(() => {
            const all = getLocalQueue();
            const byStatus = {};
            all.forEach(i => { byStatus[i.status] = (byStatus[i.status]||0) + 1; });
            return Object.entries(byStatus).length
              ? Object.entries(byStatus).map(([s,c]) => <div key={s}>{`// ${s}: ${c} item${c>1?'s':''}`}</div>)
              : <div>// fila vazia</div>;
          })()}
        </div>
        <button className="btn btn-danger btn-sm" style={{marginTop:16}}
          onClick={() => { if(window.confirm('Limpar toda a fila de conteúdo?')) { localStorage.removeItem(STORAGE_KEY); toast('Fila limpa!'); }}}>
          🗑 Limpar fila
        </button>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════
   APP PRINCIPAL
════════════════════════════════════════ */
function App() {
  const [active, setActive]         = useState('dashboard');
  const [toastMsg, setToastMsg]     = useState(null);
  const [queueCounts, setQueueCounts] = useState({videos:0, posts:0});

  const showToast = (msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(null), 3500); };

  useEffect(() => {
    const update = () => {
      const all = getLocalQueue();
      const pending = all.filter(i => i.status === 'pendente');
      setQueueCounts({ videos: pending.filter(i=>i.tipo==='video').length, posts: pending.filter(i=>i.tipo==='post').length });
    };
    update();
    const t = setInterval(update, 5000);
    return () => clearInterval(t);
  }, []);

  const titles = {
    dashboard:'Dashboard', calendar:'Calendário Editorial',
    generate:'Gerar Conteúdo', videos:'Vídeos', posts:'Posts',
    metricas:'Métricas Instagram', agente:'Agente IA — Consultoria',
    settings:'Configurações',
  };

  const pages = {
    dashboard: <Dashboard setActive={setActive} toast={showToast} />,
    calendar:  <Calendar  toast={showToast} />,
    generate:  <Generate  toast={showToast} setActive={setActive} />,
    videos:    <ContentQueue tipo="video" toast={showToast} />,
    posts:     <ContentQueue tipo="post"  toast={showToast} />,
    metricas:  <Metricas  toast={showToast} />,
    agente:    <Agente    toast={showToast} />,
    settings:  <Settings  toast={showToast} />,
  };

  return (
    <>
      <Sidebar active={active} setActive={setActive} queueCounts={queueCounts} />
      <div className="main">
        <div className="topbar">
          <div className="topbar-title">{titles[active]}</div>
          <div className="topbar-right">
            <span className="topbar-user">FacilZap · Ednardo</span>
            <button className="btn btn-primary btn-sm" onClick={() => setActive('generate')}>+ Gerar conteúdo</button>
          </div>
        </div>
        <div className="content">{pages[active]}</div>
      </div>
      {toastMsg && <div className="toast">{toastMsg}</div>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
