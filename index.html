<html lang="pt-BR">
<head>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <style>
    /* ════════════════════════════════════════
       DESIGN TOKENS
    ════════════════════════════════════════ */
    :root {
      --bg-primary:        #0a0a0f;
      --bg-secondary:      #0f0f1a;
      --bg-card:           rgba(255,255,255,0.03);
      --border:            rgba(255,255,255,0.08);
      --border-subtle:     rgba(255,255,255,0.04);
      --border-sidebar:    rgba(255,255,255,0.06);
      --accent-green:      #00ff88;
      --accent-green-dark: #00cc6a;
      --accent-green-dim:  rgba(0,255,136,0.12);
      --accent-green-glow: rgba(0,255,136,0.25);
      --accent-green-faint:rgba(0,255,136,0.04);
      --accent-orange:     #ff8c42;
      --accent-orange-dim: rgba(255,140,66,0.12);
      --accent-red:        #ff4466;
      --accent-red-dim:    rgba(255,68,102,0.12);
      --text-primary:      #ffffff;
      --text-secondary:    rgba(255,255,255,0.55);
      --text-muted:        rgba(255,255,255,0.25);
      --text-inverse:      #0a0a0f;
      --font-display:      'Syne', sans-serif;
      --font-body:         'DM Sans', sans-serif;
      --font-mono:         'JetBrains Mono', monospace;
      --sidebar-width:     240px;
      --radius-sm:         8px;
      --radius-md:         12px;
      --radius-lg:         16px;
    }

    /* ════════════════════════════════════════
       RESET & BASE
    ════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; background: var(--bg-primary);
      color: var(--text-secondary); font-family: var(--font-body);
      font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased;
    }
    #root { display: flex; min-height: 100vh; }

    /* ════════════════════════════════════════
       ANIMATIONS
    ════════════════════════════════════════ */
    @keyframes fadeInCard {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse-green {
      0%, 100% { opacity: 1; box-shadow: 0 0 6px var(--accent-green-glow); }
      50%       { opacity: 0.5; box-shadow: none; }
    }
    @keyframes shimmer {
      from { transform: translateX(-100%); }
      to   { transform: translateX(100%); }
    }
    @keyframes slideInToast {
      from { transform: translateY(80px); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ════════════════════════════════════════
       SIDEBAR
    ════════════════════════════════════════ */
    .sidebar {
      position: fixed; top: 0; left: 0; bottom: 0;
      width: var(--sidebar-width);
      background: var(--bg-secondary);
      border-right: 1px solid var(--border-sidebar);
      display: flex; flex-direction: column;
      z-index: 100;
    }
    .logo-area {
      padding: 26px 22px 20px;
      border-bottom: 1px solid var(--border-sidebar);
    }
    .logo-row { display: flex; align-items: center; gap: 10px; }
    .logo-icon {
      font-size: 22px; width: 36px; height: 36px;
      background: var(--accent-green-dim);
      border: 1px solid rgba(0,255,136,0.2);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-text {
      font-family: var(--font-display);
      font-size: 16px; font-weight: 700;
      color: var(--text-primary); letter-spacing: -0.4px;
    }
    .logo-sub {
      font-family: var(--font-mono);
      font-size: 10px; color: var(--text-muted);
      margin-top: 6px; letter-spacing: 0.3px;
    }
    .nav { flex: 1; padding: 10px 0; overflow-y: auto; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 22px; cursor: pointer;
      border-left: 2px solid transparent;
      transition: all 200ms ease;
      color: var(--text-secondary); font-size: 13px; font-weight: 500;
    }
    .nav-item:hover {
      color: var(--text-primary);
      background: rgba(255,255,255,0.03);
      border-left-color: rgba(255,255,255,0.18);
    }
    .nav-item.active {
      color: var(--accent-green);
      background: rgba(0,255,136,0.05);
      border-left-color: var(--accent-green);
    }
    .nav-icon { width: 18px; text-align: center; font-size: 13px; flex-shrink: 0; }
    .nav-badge {
      margin-left: auto;
      background: var(--accent-orange);
      color: #000;
      font-size: 10px; font-weight: 700;
      padding: 2px 6px; border-radius: 10px;
      min-width: 18px; text-align: center;
    }
    .sidebar-footer {
      padding: 18px 22px;
      border-top: 1px solid var(--border-sidebar);
      font-family: var(--font-mono);
      font-size: 11px; color: var(--text-muted);
    }
    .status-pulse {
      display: inline-block; width: 6px; height: 6px;
      border-radius: 50%; background: var(--accent-green);
      margin-right: 8px; vertical-align: middle;
      animation: pulse-green 2s ease-in-out infinite;
    }

    /* ════════════════════════════════════════
       LAYOUT PRINCIPAL
    ════════════════════════════════════════ */
    .main { margin-left: var(--sidebar-width); flex: 1; display: flex; flex-direction: column; }
    .topbar {
      position: sticky; top: 0;
      background: rgba(10,10,15,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 32px; height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      z-index: 50;
    }
    .topbar-title {
      font-family: var(--font-display);
      font-size: 16px; font-weight: 700;
      color: var(--text-primary); letter-spacing: -0.3px;
    }
    .topbar-right { display: flex; align-items: center; gap: 14px; }
    .topbar-user {
      font-family: var(--font-mono); font-size: 11px;
      color: var(--text-muted);
    }
    .content { padding: 32px; flex: 1; }

    /* ════════════════════════════════════════
       BUTTONS
    ════════════════════════════════════════ */
    .btn {
      position: relative; overflow: hidden;
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 18px; border-radius: var(--radius-sm);
      font-family: var(--font-body); font-size: 13px;
      font-weight: 600; cursor: pointer;
      border: none; transition: all 200ms ease;
      text-decoration: none;
    }
    .btn::before {
      content: '';
      position: absolute; top: 0; left: -100%; bottom: 0;
      width: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.07), transparent);
      transition: none;
    }
    .btn:hover::before { animation: shimmer 0.55s ease; }
    .btn-primary {
      background: var(--accent-green);
      color: var(--text-inverse);
    }
    .btn-primary:hover {
      background: var(--accent-green-dark);
      transform: translateY(-1px);
      box-shadow: 0 4px 20px var(--accent-green-glow);
    }
    .btn-primary:active { transform: translateY(0); }
    .btn-secondary {
      background: rgba(255,255,255,0.05);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,0.08);
      color: var(--text-primary);
      border-color: rgba(255,255,255,0.16);
    }
    .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 7px; }
    .btn-ghost {
      background: transparent; color: var(--text-muted);
      border: 1px solid transparent;
    }
    .btn-ghost:hover { color: var(--text-primary); border-color: var(--border); }
    .btn-danger {
      background: var(--accent-red-dim);
      color: var(--accent-red);
      border: 1px solid rgba(255,68,102,0.2);
    }
    .btn-danger:hover {
      background: rgba(255,68,102,0.2);
      transform: translateY(-1px);
    }
    .btn-approve {
      background: var(--accent-green-dim);
      color: var(--accent-green);
      border: 1px solid rgba(0,255,136,0.2);
    }
    .btn-approve:hover {
      background: rgba(0,255,136,0.2);
      transform: translateY(-1px);
    }

    /* ════════════════════════════════════════
       CARDS
    ════════════════════════════════════════ */
    .card {
      background: var(--bg-card);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
      animation: fadeInCard 0.35s ease both;
    }
    .card-title {
      font-family: var(--font-display);
      font-size: 14px; font-weight: 700;
      letter-spacing: -0.2px; margin-bottom: 20px;
      color: var(--text-primary);
    }

    /* ════════════════════════════════════════
       METRIC CARDS
    ════════════════════════════════════════ */
    .stats-grid {
      display: grid; grid-template-columns: repeat(4,1fr);
      gap: 16px; margin-bottom: 32px;
    }
    .stat-card {
      background: var(--bg-card);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 24px 22px;
      position: relative; overflow: hidden;
      transition: border-color 250ms ease, transform 250ms ease, box-shadow 250ms ease;
      animation: fadeInCard 0.4s ease both;
    }
    .stat-card::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(0,255,136,0.05) 0%, transparent 55%);
      pointer-events: none;
    }
    .stat-card:hover {
      border-color: rgba(0,255,136,0.2);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0,255,136,0.06);
    }
    .stat-label {
      font-family: var(--font-mono); font-size: 10px;
      color: var(--text-muted); letter-spacing: 0.8px;
      text-transform: uppercase; margin-bottom: 12px;
    }
    .stat-value {
      font-family: var(--font-display); font-size: 36px;
      font-weight: 800; color: var(--text-primary);
      letter-spacing: -1.5px; line-height: 1;
    }
    .stat-change { font-size: 12px; color: var(--text-muted); margin-top: 6px; }
    .stat-change .up { color: var(--accent-green); }

    /* ════════════════════════════════════════
       SECTION HEADER
    ════════════════════════════════════════ */
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .section-title {
      font-family: var(--font-display); font-size: 13px;
      font-weight: 700; color: var(--text-secondary);
      text-transform: uppercase; letter-spacing: 0.5px;
    }

    /* ════════════════════════════════════════
       TABLE
    ════════════════════════════════════════ */
    .calendar-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .calendar-table th {
      font-family: var(--font-mono); font-size: 10px;
      color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.6px;
      padding: 14px 12px; text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .calendar-table td {
      padding: 14px 12px;
      border-bottom: 1px solid var(--border-subtle);
      color: var(--text-secondary);
    }
    .calendar-table tbody tr:last-child td { border-bottom: none; }
    .calendar-table tbody tr:hover td { background: rgba(255,255,255,0.02); }
    .date-cell { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }

    /* ════════════════════════════════════════
       BADGES
    ════════════════════════════════════════ */
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 9px; border-radius: 6px;
      font-size: 11px; font-weight: 600;
      font-family: var(--font-mono);
    }
    .badge-video { background: rgba(100,120,255,0.12); color: #8899ff; border: 1px solid rgba(100,120,255,0.2); }
    .badge-post  { background: rgba(255,170,50,0.12);  color: #ffb347; border: 1px solid rgba(255,170,50,0.2); }
    .badge-pending  { background: rgba(255,255,255,0.05); color: var(--text-muted); border: 1px solid var(--border); }
    .badge-done     { background: var(--accent-green-dim); color: var(--accent-green); border: 1px solid rgba(0,255,136,0.2); }
    .badge-gerando  { background: rgba(255,170,50,0.12); color: #ffb347; border: 1px solid rgba(255,170,50,0.2); }
    .badge-aprovado { background: var(--accent-green-dim); color: var(--accent-green); border: 1px solid rgba(0,255,136,0.2); }
    .badge-agendado { background: rgba(100,120,255,0.12); color: #8899ff; border: 1px solid rgba(100,120,255,0.2); }
    .badge-rejeitado{ background: var(--accent-red-dim); color: var(--accent-red); border: 1px solid rgba(255,68,102,0.2); }

      animation: fadeInCard 0.4s ease both;
    }

    }

    }

    /* ════════════════════════════════════════

    ════════════════════════════════════════ */
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .section-title {
      font-family: var(--font-display); font-size: 13px;
      font-weight: 700; color: var(--text-secondary);
      text-transform: uppercase; letter-spacing: 0.5px;
    }

    /* ════════════════════════════════════════

      padding: 3px 9px; border-radius: 6px;

    }
    .badge-video { background: rgba(100,120,255,0.12); color: #8899ff; border: 1px solid rgba(100,120,255,0.2); }
    .badge-post  { background: rgba(255,170,50,0.12);  color: #ffb347; border: 1px solid rgba(255,170,50,0.2); }
    .badge-pending  { background: rgba(255,255,255,0.05); color: var(--text-muted); border: 1px solid var(--border); }
    .badge-done     { background: var(--accent-green-dim); color: var(--accent-green); border: 1px solid rgba(0,255,136,0.2); }
    .badge-gerando  { background: rgba(255,170,50,0.12); color: #ffb347; border: 1px solid rgba(255,170,50,0.2); }
    .badge-aprovado { background: var(--accent-green-dim); color: var(--accent-green); border: 1px solid rgba(0,255,136,0.2); }
    .badge-agendado { background: rgba(100,120,255,0.12); color: #8899ff; border: 1px solid rgba(100,120,255,0.2); }
    .badge-rejeitado{ background: var(--accent-red-dim); color: var(--accent-red); border: 1px solid rgba(255,68,102,0.2); }

    /* ════════════════════════════════════════
       TWO-COL LAYOUT
    ════════════════════════════════════════ */
    .two-col {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 20px; margin-top: 20px;
    }

    /* ════════════════════════════════════════
       ACTIVITY FEED
    ════════════════════════════════════════ */
    .activity-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border-subtle);
    }
    .activity-item:last-child { border-bottom: none; }
    .activity-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
    .activity-body {}
    .activity-title { font-size: 13px; color: var(--text-secondary); line-height: 1.4; }
    .activity-time { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); margin-top: 3px; }

    /* ════════════════════════════════════════
       PROGRESS
    ════════════════════════════════════════ */
    .progress-wrap { margin-bottom: 16px; }
    .progress-header { display: flex; justify-content: space-between; margin-bottom: 6px; }
    .progress-label { font-size: 12px; color: var(--text-secondary); }
    .progress-val { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
    .progress-bar {
      height: 4px; background: rgba(255,255,255,0.06);
      border-radius: 2px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: var(--accent-green);
      border-radius: 2px; transition: width 1s ease;
    }
    .code-note {
      font-family: var(--font-mono); font-size: 10px;
      color: var(--text-muted); margin-top: 16px; line-height: 1.6;
    }

    /* ════════════════════════════════════════
       TABS
    ════════════════════════════════════════ */
    .tabs {
      display: flex; gap: 8px; margin-bottom: 20px;
    }
    .tab-btn {
      padding: 8px 18px; border-radius: var(--radius-sm);
      font-family: var(--font-body); font-size: 13px; font-weight: 600;
      cursor: pointer; border: 1px solid var(--border);
      background: transparent; color: var(--text-muted);
      transition: all 200ms ease;
    }
    .tab-btn:hover { color: var(--text-primary); border-color: rgba(255,255,255,0.16); }
    .tab-btn.active {
      background: var(--accent-green-dim);
      color: var(--accent-green);
      border-color: rgba(0,255,136,0.3);
    }

    /* ════════════════════════════════════════
       FORM
    ════════════════════════════════════════ */
    .form-group { margin-bottom: 18px; }
    .form-label {
      display: block; font-size: 12px; font-weight: 600;
      color: var(--text-muted); text-transform: uppercase;
      letter-spacing: 0.5px; margin-bottom: 7px;
      font-family: var(--font-mono);
    }
    .form-input {
      width: 100%; padding: 10px 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary); font-family: var(--font-body);
      font-size: 13px; outline: none;
      transition: border-color 200ms ease, box-shadow 200ms ease;
    }
    .form-input:focus {
      border-color: rgba(0,255,136,0.4);
      box-shadow: 0 0 0 3px rgba(0,255,136,0.08);
    }
    .form-input::placeholder { color: var(--text-muted); }
    .form-textarea {
      width: 100%; padding: 10px 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary); font-family: var(--font-body);
      font-size: 13px; outline: none; resize: vertical; min-height: 90px;
      transition: border-color 200ms ease, box-shadow 200ms ease;
    }
    .form-textarea:focus {
      border-color: rgba(0,255,136,0.4);
      box-shadow: 0 0 0 3px rgba(0,255,136,0.08);
    }
    .form-textarea::placeholder { color: var(--text-muted); }
    .info-box {
      background: rgba(0,255,136,0.04);
      border: 1px solid rgba(0,255,136,0.12);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      font-size: 12px; color: var(--text-muted);
      line-height: 1.6; margin-bottom: 20px;
    }
    .info-box strong { color: var(--accent-green); }

    /* ════════════════════════════════════════
       GENERATE HISTORY
    ════════════════════════════════════════ */
    .gen-item {

/* ── HOOK: COUNT-UP ── */
function useCountUp(target, duration = 1400) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    let frame = 0;
    const totalFrames = Math.round(duration / 16);
    const timer = setInterval(() => {
      frame++;
      const progress = frame / totalFrames;
      const eased = 1 - Math.pow(1 - progress, 3);
      setVal(Math.min(target, Math.round(target * eased)));
      if (frame >= totalFrames) clearInterval(timer);
    }, 16);
    return () => clearInterval(timer);
  }, [target]);
  return val;
}

    setLoading(true);
    const newItem = {
      id: Date.now().toString(),
      tipo: tab,
      tema: theme,
      keywords: kws,
      url: null,
      status: 'gerando',
      criado_em: new Date().toISOString(),
      agendado_para: null,
    };
    addToQueue(newItem);
    try {
      await fetch(tab === 'video' ? WEBHOOKS.triggerVideo : WEBHOOKS.triggerPost, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({theme, keywords: kws, extra, type: tab, queueId: newItem.id})
      });
      toast(`Conteúdo enviado para geração — verifique em ${tab === 'video' ? 'Vídeos' : 'Posts'} para revisar`);
      setTheme(''); setKws(''); setExtra('');
      setTimeout(() => setActive(tab === 'video' ? 'videos' : 'posts'), 1200);

    setLoading(false);

          className="btn btn-primary"
          style={{width:'100%', padding:'13px', fontSize:14}}

          disabled={loading}

  );
}

          <input
            type="datetime-local"
            className="datetime-input"
            value={dateTime}
            onChange={e => setDateTime(e.target.value)}
            min={new Date().toISOString().slice(0,16)}
          />
        </div>
        <div className="modal-actions">
          <button className="btn btn-primary" style={{flex:1}} onClick={handleConfirm} disabled={loading}>
            {loading ? '⏳ Agendando...' : '📅 Confirmar Agendamento'}
          </button>
          <button className="btn btn-secondary" onClick={onClose}>Cancelar</button>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════
   QUEUE CARD
═══════════════════════════════════════ */
function QueueCard({ item, onAprovar, onRejeitar, onAgendar }) {
  const statusLabel = {
    gerando:   'Em geração',
    pendente:  'Aguardando revisão',
    aprovado:  'Aprovado',
    agendado:  'Agendado',
    rejeitado: 'Rejeitado',
    publicado: 'Publicado',
  };
  const statusBadge = {
    gerando:   'badge-gerando',
    pendente:  'badge-pending',
    aprovado:  'badge-aprovado',
    agendado:  'badge-agendado',
    rejeitado: 'badge-rejeitado',
    publicado: 'badge-done',
  };

  const formatDate = (iso) => {
    if (!iso) return '';
    const d = new Date(iso);
    return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
  };

  return (
    <div className={`queue-card status-${item.status}`}>
      {item.url ? (
        item.tipo === 'video'
          ? <video src={item.url} className="queue-preview" controls preload="metadata" />
          : <img src={item.url} alt={item.tema} className="queue-preview" />
      ) : (
        <div className="queue-preview-placeholder">
          <div className="queue-preview-placeholder-icon">
            {item.tipo === 'video' ? '🎬' : '🖼️'}
          </div>
          {item.status === 'gerando' && (
            <div className="queue-preview-placeholder-text">
              <span className="queue-spinner" />
              gerando conteúdo...
            </div>
          )}
          {item.status !== 'gerando' && (
            <div className="queue-preview-placeholder-text">preview não disponível</div>
          )}
        </div>
      )}
      <div className="queue-body">
        <div className="queue-meta">
          <span className={`badge badge-${item.tipo}`}>
            {item.tipo === 'video' ? '▷ Vídeo' : '⊞ Post'}
          </span>
          <span className={`badge ${statusBadge[item.status] || 'badge-pending'}`}>
            {statusLabel[item.status] || item.status}
          </span>
        </div>
        <div className="queue-theme">{item.tema}</div>
        <div className="queue-date">
          Criado {formatDate(item.criado_em)}
          {item.agendado_para && ` · Agendado ${formatDate(item.agendado_para)}`}
        </div>
        {(item.status === 'pendente' || item.status === 'gerando') && (
          <div className="queue-actions">
            {item.status === 'pendente' && (
              <>
                <button className="btn btn-approve btn-sm" onClick={() => onAprovar(item)}>
                  ✓ Aprovar
                </button>
                <button className="btn btn-danger btn-sm" onClick={() => onRejeitar(item.id)}>
                  ✗ Rejeitar
                </button>
              </>
            )}
            {item.status === 'gerando' && (
              <span style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--text-muted)'}}>
                <span className="queue-spinner" /> aguardando geração...
              </span>
            )}
          </div>
        )}
        {item.status === 'aprovado' && (
          <div className="queue-actions">
            <button className="btn btn-primary btn-sm" onClick={() => onAgendar(item)}>
              📅 Agendar publicação
            </button>
          </div>
        )}
        {item.url && item.status !== 'gerando' && (
          <div style={{marginTop:8}}>
            <a href={item.url} target="_blank" rel="noopener noreferrer"
               className="btn btn-secondary btn-sm" style={{fontSize:11}}>
              ↗ Ver conteúdo
            </a>
          </div>
        )}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════
   VIDEOS / POSTS PAGE
═══════════════════════════════════════ */
function ContentQueue({ tipo, toast }) {
  const [queue, setQueue]         = useState([]);
  const [tab, setTab]             = useState('revisao');
  const [scheduleItem, setScheduleItem] = useState(null);

  const reload = useCallback(() => {
    const all = getLocalQueue();
    setQueue(all.filter(i => i.tipo === tipo));
  }, [tipo]);

  useEffect(() => {
    reload();
    const interval = setInterval(reload, 5000);
    return () => clearInterval(interval);
  }, [reload]);

  const handleAprovar = (item) => {
    updateQueueItem(item.id, {status:'aprovado'});
    setQueue(getLocalQueue().filter(i => i.tipo === tipo));
    // Optionally notify n8n
    fetch(WEBHOOKS.aprovar, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({id: item.id, tipo: item.tipo, tema: item.tema})
    }).catch(() => {});
    toast('Conteúdo aprovado! Clique em "Agendar publicação" para definir data e hora.');
  };

  const handleRejeitar = (id) => {
    updateQueueItem(id, {status:'rejeitado'});
    setQueue(getLocalQueue().filter(i => i.tipo === tipo));
    fetch(WEBHOOKS.rejeitar, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({id})
    }).catch(() => {});
    toast('Conteúdo rejeitado.');
  };

  const handleAgendar = (item) => {
    setScheduleItem(item);
  };

  const confirmAgendamento = async (id, dateTime) => {
    updateQueueItem(id, {status:'agendado', agendado_para: dateTime});
    setQueue(getLocalQueue().filter(i => i.tipo === tipo));
    setScheduleItem(null);
    try {
      await fetch(WEBHOOKS.agendar, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({id, agendado_para: dateTime})
      });
      toast(`Publicação agendada para ${new Date(dateTime).toLocaleString('pt-BR')}`);
    } catch(e) {
      toast('Agendamento salvo localmente — verifique conexão com n8n');
    }
  };

  const revisaoItems  = queue.filter(i => ['gerando','pendente','aprovado'].includes(i.status));
  const publicadosItems = queue.filter(i => ['agendado','publicado','rejeitado'].includes(i.status));

  const tipoLabel = tipo === 'video' ? 'Vídeo' : 'Post';

  return (
    <>
      <div className="tabs">
        <button className={`tab-btn${tab === 'revisao' ? ' active' : ''}`} onClick={() => setTab('revisao')}>
          🔍 Fila de Revisão
          {revisaoItems.filter(i=>i.status==='pendente').length > 0 && (
            <span style={{
              background:'var(--accent-orange)', color:'#000',
              fontSize:10, fontWeight:700, padding:'1px 6px', borderRadius:8,
              marginLeft:8
            }}>
              {revisaoItems.filter(i=>i.status==='pendente').length}
            </span>
          )}
        </button>
        <button className={`tab-btn${tab === 'publicados' ? ' active' : ''}`} onClick={() => setTab('publicados')}>
          ✅ {tipoLabel}s Agendados/Publicados
        </button>
      </div>

      {tab === 'revisao' && (
        <>
          {revisaoItems.length === 0 ? (
            <div className="card">
              <div className="empty-state">
                <div className="empty-icon">{tipo === 'video' ? '🎬' : '🖼️'}</div>
                <div className="empty-title">Nenhum conteúdo na fila</div>
                <div className="empty-sub">
                  // gere um {tipoLabel.toLowerCase()} na aba "Gerar Conteúdo" para revisar aqui
                </div>
              </div>
            </div>
          ) : (
            <div className="queue-grid">
              {revisaoItems.map(item => (
                <QueueCard
                  key={item.id}
                  item={item}
                  onAprovar={handleAprovar}
                  onRejeitar={handleRejeitar}
                  onAgendar={handleAgendar}
                />
              ))}
            </div>
          )}
        </>
      )}

      {tab === 'publicados' && (
        <>
          {publicadosItems.length === 0 ? (
            <div className="card">
              <div className="empty-state">
                <div className="empty-icon">📅</div>
                <div className="empty-title">Nenhum {tipoLabel.toLowerCase()} agendado ainda</div>
                <div className="empty-sub">
                  // aprove um conteúdo na aba de revisão para aparecer aqui
                </div>
              </div>
            </div>
          ) : (
            <div className="queue-grid">
              {publicadosItems.map(item => (
                <QueueCard
                  key={item.id}
                  item={item}
                  onAprovar={handleAprovar}
                  onRejeitar={handleRejeitar}
                  onAgendar={handleAgendar}
                />
              ))}
            </div>
          )}
        </>
      )}

      {scheduleItem && (
        <ScheduleModal
          item={scheduleItem}
          onClose={() => setScheduleItem(null)}
          onConfirm={confirmAgendamento}
        />
      )}
    </>
  );
}

/* ═══════════════════════════════════════
   CONFIGURAÇÕES
═══════════════════════════════════════ */
function Settings({ toast }) {
  const [n8nUrl, setN8nUrl] = useState('https://facilzap.app.n8n.cloud');
  const save = () => toast('Configurações salvas!');

  return (
    <div style={{maxWidth:580}}>
      <div className="card">
        <div className="card-title">Conexões do Sistema</div>
        {[
          {label:'URL do n8n',      val:n8nUrl,              set:setN8nUrl, hint:'https://facilzap.app.n8n.cloud'},
          {label:'Instagram @',     val:'@facilzapoficial',  set:()=>{},    hint:'@suaconta'},
          {label:'Google Sheet ID', val:'',                  set:()=>{},    hint:'1BxiM...'},
        ].map((f, i) => (
          <div className="form-group" key={i}>
            <label className="form-label">{f.label}</label>
            <input className="form-input" value={f.val}
              onChange={e => f.set(e.target.value)} placeholder={f.hint} />
          </div>
        ))}
        <button className="btn btn-primary" onClick={save}>Salvar configurações</button>
      </div>

      <div className="card" style={{marginTop:20}}>
        <div className="card-title">Status das Integrações</div>
        {[
          {name:'n8n Cloud',        ok:true,  note:'facilzap.app.n8n.cloud'},
          {name:'OpenAI GPT-4o',    ok:true,  note:'API Key configurada'},
          {name:'HeyGen Avatar',    ok:true,  note:'FacilZap-n8n key ativa'},
          {name:'Creatomate',       ok:true,  note:'API key ativa'},
          {name:'Instagram / Meta', ok:false, note:'Aprovação manual ativada'},
          {name:'Google Sheets',    ok:false, note:'Aguardando planilha'},
        ].map((s, i) => (
          <div className="integration-item" key={i}>
            <div>
              <span className={`status-dot ${s.ok ? 'dot-green' : 'dot-dim'}`} />
              <span className="integration-name"
                style={{color: s.ok ? 'var(--text-primary)' : 'var(--text-secondary)'}}>
                {s.name}
              </span>
            </div>
            <span className="integration-note">{s.note}</span>
          </div>
        ))}
      </div>

      <div className="card" style={{marginTop:20}}>
        <div className="card-title">Fila de Conteúdo — Diagnóstico</div>
        <div style={{fontFamily:'var(--font-mono)', fontSize:11, color:'var(--text-muted)', lineHeight:2}}>
          {(() => {
            const all = getLocalQueue();
            const byStatus = {};
            all.forEach(i => { byStatus[i.status] = (byStatus[i.status]||0) + 1; });
            return Object.entries(byStatus).map(([s,c]) => (
              <div key={s}>{`// ${s}: ${c} item${c>1?'s':''}`}</div>
            ));
          })()}
          {getLocalQueue().length === 0 && <div>// fila vazia</div>}
        </div>
        <button className="btn btn-secondary btn-sm" style={{marginTop:16}}
          onClick={() => {
            if (window.confirm('Limpar toda a fila de conteúdo?')) {
              localStorage.removeItem(STORAGE_KEY);
              toast('Fila limpa!');
            }
          }}>
          🗑 Limpar fila
        </button>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════
   APP PRINCIPAL
═══════════════════════════════════════ */
function App() {
  const [active, setActive]     = useState('dashboard');
  const [toastMsg, setToastMsg] = useState(null);
  const [queueCounts, setQueueCounts] = useState({videos:0, posts:0});

  const showToast = (msg) => {
    setToastMsg(msg);
    setTimeout(() => setToastMsg(null), 3500);
  };

  // Refresh badge counts every 5s
  useEffect(() => {
    const updateCounts = () => {
      const all = getLocalQueue();
      const pending = all.filter(i => i.status === 'pendente');
      setQueueCounts({
        videos: pending.filter(i => i.tipo === 'video').length,
        posts:  pending.filter(i => i.tipo === 'post').length,
      });
    };
    updateCounts();
    const interval = setInterval(updateCounts, 5000);
    return () => clearInterval(interval);
  }, []);

  const titles = {
    dashboard: 'Dashboard',
    calendar:  'Calendário Editorial',
    generate:  'Gerar Conteúdo',
    videos:    'Vídeos',
    posts:     'Posts',
    settings:  'Configurações',
  };

  const pages = {
    dashboard: <Dashboard setActive={setActive} toast={showToast} />,
    calendar:  <Calendar  toast={showToast} />,
    generate:  <Generate  toast={showToast} setActive={setActive} />,
    videos:    <ContentQueue tipo="video" toast={showToast} />,
    posts:     <ContentQueue tipo="post"  toast={showToast} />,
    settings:  <Settings  toast={showToast} />,
  };

  return (
    <>
      <Sidebar active={active} setActive={setActive} queueCounts={queueCounts} />
      <div className="main">
        <div className="topbar">
          <div className="topbar-title">{titles[active]}</div>
          <div className="topbar-right">
            <span className="topbar-user">FacilZap · Ednardo</span>
            <button className="btn btn-primary btn-sm" onClick={() => setActive('generate')}>
              + Gerar conteúdo
            </button>
          </div>
        </div>
        <div className="content">
          {pages[active]}
        </div>
      </div>
      {toastMsg && <div className="toast">{toastMsg}</div>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
